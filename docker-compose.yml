services:
  db:
    image: postgres:15-alpine
    container_name: medichain_db
    restart: always
    environment:
      - POSTGRES_USER=medimed
      - POSTGRES_PASSWORD=securepass
      - POSTGRES_DB=medichain
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medimed -d medichain"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: medichain_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://medimed:securepass@db:5432/medichain
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: